<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Titulo e descricao por pagina sao definidos pelo componente Seo (React 19)
         e ficam assados no HTML final pela pre-renderizacao (scripts/prerender.mjs). -->
    <meta name="keywords" content="cavaquinho brasileiro, choro, partituras, compositores, música brasileira, Pedro Cantalice" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preload" href="/fonts/inter-400-normal-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-700-normal-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/crimsonpro-400-normal-latin.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Herói/banner (fundo em CSS, usado na Home e nas páginas internas): preload
         para o navegador começar a baixar antes de parsear o CSS — melhora o LCP. -->
    <link rel="preload" href="/hero-bg.png" as="image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
